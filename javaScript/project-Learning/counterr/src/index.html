<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body>
    <h2 id="num">0</h2>
    <button
      class="rounded text-[0.9rem] font-bold px-1 py-0.5 bg-black text-green-600 hover:cursor-pointer hover:bg-green-600 hover:text-white"
      id="inc"
    >
      increase
    </button>
    <button
      class="rounded text-[0.9rem] font-bold px-1 py-0.5 bg-black text-red-600 hover:cursor-pointer hover:bg-red-600 hover:text-white"
      id="dec"
    >
      decrease
    </button>
    <button
      class="rounded text-[0.9rem] font-bold px-1 py-0.5 bg-black text-red-600 hover:cursor-pointer hover:bg-red-600 hover:text-white"
      id="reset"
    >
      reset
    </button>
    <script src="app.js"></script>
  </body>
</html>
