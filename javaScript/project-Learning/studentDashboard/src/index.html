<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students Dashboard</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="flex flex-col items-center h-screen justify-center">
    <h3 class="w-max" id="display">Students</h3>
    <div>
      <button
        class="px-2 py-0.5 bg-blue-500 rounded text-white w-max"
        id="allBtn"
      >
        Show All
      </button>
      <button
        class="px-2 py-0.5 bg-red-500 rounded text-white w-max"
        id="passed"
      >
        Passed
      </button>
      <button
        class="px-2 py-0.5 bg-green-500 rounded text-white w-max"
        id="failed"
      >
        Failed
      </button>
      <button
        class="px-2 py-0.5 bg-green-500 rounded text-white w-max"
        id="topper"
      >
        Topper
      </button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
