<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CounterTwo</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="flex justify-center h-screen items-center">
    <div
      class="w-50 h-70 border border-white flex flex-col items-center justify-center gap-y-9"
    >
      <h2 class="text-2xl text-yellow-300">Display</h2>
      <div class="flex justify-center gap-4">
        <button
          class="rounded text-[0.9rem] font-bold px-1 py-0.5 bg-amber-50 text-green-600 hover:cursor-pointer hover:bg-green-600 hover:text-white"
        >
          increase
        </button>
        <button
          class="rounded text-[0.9rem] font-bold px-1 py-0.5 bg-amber-50 text-red-600 hover:cursor-pointer hover:bg-red-600 hover:text-white"
        >
          decrease
        </button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
