<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="flex justify-center items-center h-screen">
    <div class="h-90 w-68 border-white border-2 flex items-center flex-col">
      <h1
        id="display"
        class="bg-blue-600 font-bold text-white h-min py-2 px-4.5 mt-19"
      >
        Display
      </h1>
      <div class="flex space-x-2 relative top-15">
        <button
          id="increase"
          class="border rounded-2xl bg-green-500 px-3 py-0.5 cursor-pointer"
        >
          increase
        </button>
        <button
          id="decrease"
          class="border rounded-2xl bg-red-500 px-3 py-0.5 cursor-pointer"
        >
          decrease
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
